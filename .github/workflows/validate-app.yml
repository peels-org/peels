name: Validate App

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run app checks
        run: npm run check

      - name: Build app
        if: github.event_name == 'pull_request'
        run: npm run build

  e2e-prod:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: check
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase stack
        run: supabase start

      - name: Replay migrations, seed data, and demo media
        run: npm run supabase:reset

      - name: Write local app env
        shell: bash
        run: |
          eval "$(supabase status -o env | sed 's/^/export /')"
          cat <<EOF > .env.local
          NEXT_PUBLIC_SITE_URL=http://127.0.0.1:3000
          NEXT_PUBLIC_SUPABASE_URL=${API_URL}
          NEXT_PUBLIC_SUPABASE_ANON_KEY=${ANON_KEY}
          NEXT_PUBLIC_MAPTILER_API_KEY=playwright-local
          NEXT_PUBLIC_PROTOMAPS_API_KEY=playwright-local
          NEXT_PUBLIC_TURNSTILE_ENABLED=
          EOF

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run Playwright production smoke tests
        run: npm run test:e2e:prod

      - name: Upload Playwright artefacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artefacts
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore
